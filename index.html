  headerBg:"linear-gradient(135deg,#d8efc8 0%,#c2e0a8 100%)",
  headerBorder:"#5a9e36", tabBg:"#e2efd8",
  danger:"#991b1b", dangerBg:"#fef2f2", savedBg:"#dcfce7",
};

function MonarchFieldApp() {
  const [dark, setDark]           = useState(true);
  const [activeTab, setActiveTab] = useState(0);
  const [tree, setTree]           = useState(emptyTree());
  const [records, setRecords]     = useState([]);
  const [nextID, setNextID]       = useState(1200);
  const [filterPhase, setFilterPhase] = useState("All");
  const [saved, setSaved]         = useState(false);
  const [searchTerm, setSearchTerm] = useState("");
  const [speciesSearch, setSpeciesSearch] = useState("");
  const [showSpeciesList, setShowSpeciesList] = useState(false);
  const [customSpecies, setCustomSpecies] = useState([]);
  const [showAddSpecies, setShowAddSpecies] = useState(false);
  const [newCommon, setNewCommon] = useState("");
  const [newBotanical, setNewBotanical] = useState("");
  const [selectedMapRecord, setSelectedMapRecord] = useState(null);
  const [mapColorMode, setMapColorMode] = useState("species");
  const [mapLayer, setMapLayer]           = useState("street");
  const tileLayerRef    = useRef(null);
  const overlayRef      = useRef(null);     // L.imageOverlay instance
  const cornerMarkersRef= useRef([]);       // 4 draggable corner markers
  const [overlayImg,    setOverlayImg]    = useState(null);   // base64 data URL
  const [overlayBounds, setOverlayBounds] = useState(null);   // [[s,w],[n,e]]
  const [overlayOpacity,setOverlayOpacity]= useState(0.6);
  const [overlayVisible,setOverlayVisible]= useState(true);
  const [overlayName,   setOverlayName]   = useState("");
  const [showOverlayPanel, setShowOverlayPanel] = useState(false);
  const [gpsStatus, setGpsStatus] = useState("idle");
  const [camActive, setCamActive]     = useState(false);
  const [photoMode, setPhotoMode]     = useState("auto");
  const [photoIndexManual, setPhotoIndexManual] = useState("");
  const [compassHeading, setCompassHeading] = useState(null);
  const [photoFlash, setPhotoFlash]   = useState(false);
  const videoRef  = useRef(null);
  const canvasRef = useRef(null);
  const mapRef        = useRef(null);
  const leafletMapRef = useRef(null);
  const markersRef    = useRef({});

  const T = dark ? darkTheme : lightTheme;
  const update    = (f,v) => setTree(t => ({...t,[f]:v}));
  const toggleArr = (f,v) => setTree(t => ({...t,[f]:t[f].includes(v)?t[f].filter(x=>x!==v):[...t[f],v]}));

  const getLocation = useCallback(() => {
    if (!navigator.geolocation) { alert("Geolocation not supported."); return; }
    setGpsStatus("loading");
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const lat = pos.coords.latitude.toFixed(6);
        const lng = pos.coords.longitude.toFixed(6);
        update("lat", lat);
        update("lng", lng);
        setGpsStatus("ok");
        setTimeout(() => setGpsStatus("idle"), 3000);

        // ── Reverse geocode → auto-fill address ──────────────────────
        try {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&addressdetails=1`,
            { headers: { "Accept-Language": "en-US,en", "User-Agent": "ArborFieldPro/3.0" } }
          );
          const data = await res.json();
          if (data && data.address) {
            const a = data.address;
            // Build a clean US street address
            const num    = a.house_number || "";
            const street = a.road || a.pedestrian || a.footway || "";
            const city   = a.city || a.town || a.village || a.hamlet || a.county || "";
            const state  = a.state || "";
            const zip    = a.postcode || "";
            const parts  = [
              [num, street].filter(Boolean).join(" "),
              city,
              [state, zip].filter(Boolean).join(" ")
            ].filter(Boolean);
            const fullAddr = parts.join(", ");
            if (fullAddr.trim()) {
              setTree(t => ({ ...t, address: t.address || fullAddr }));
            }
          }
        } catch(e) {
          // Reverse geocode failed silently — address remains editable
          console.warn("Reverse geocode failed:", e);
        }
      },
      err => {
        setGpsStatus("error");
        alert("GPS error: " + err.message);
        setTimeout(() => setGpsStatus("idle"), 4000);
      },
      {enableHighAccuracy:true, timeout:15000, maximumAge:0}
    );
  }, []);

  // Compass
  useEffect(() => {
    const handler = (e) => {
      const h = e.webkitCompassHeading ?? e.alpha;
      if (h != null) setCompassHeading(Math.round(h));
    };
    if (window.DeviceOrientationEvent) {
      if (typeof DeviceOrientationEvent.requestPermission === "function") {
        // iOS 13+ — permission requested on demand in startCam
      } else {
        window.addEventListener("deviceorientation", handler, true);
      }
    }
    return () => window.removeEventListener("deviceorientation", handler, true);
  }, []);


  // ── Site Plan Overlay ────────────────────────────────────────────────────
  const handleOverlayUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setOverlayName(file.name.replace(/\.[^.]+$/,""));
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      setOverlayImg(dataUrl);
      // Default bounds: ±0.003 deg (~300m) around current map center
      const map = leafletMapRef.current;
      const center = map ? map.getCenter() : {lat:35.0505, lng:-120.6080};
      const d = 0.003;
      const bounds = [[center.lat - d, center.lng - d],[center.lat + d, center.lng + d]];
      setOverlayBounds(bounds);
      setOverlayVisible(true);
    };
    reader.readAsDataURL(file);
  };

  const buildOverlay = (L, map, dataUrl, bounds, opacity, visible) => {
    // Remove existing overlay + corner markers
    if (overlayRef.current) { try { map.removeLayer(overlayRef.current); } catch(e){} }
    cornerMarkersRef.current.forEach(m => { try { map.removeLayer(m); } catch(e){} });
    cornerMarkersRef.current = [];
    if (!dataUrl || !bounds) return;

    const ol = L.imageOverlay(dataUrl, bounds, {
      opacity: visible ? opacity : 0,
      interactive: false,
      className: "site-plan-overlay"
    }).addTo(map);
    overlayRef.current = ol;

    if (!visible) return;

    // ── 4 draggable corner markers ──────────────────────────────────────
    const [[s,w],[n,e]] = bounds;
    const corners = [
      {pos:[n,w], label:"NW", idx:0},
      {pos:[n,e], label:"NE", idx:1},
      {pos:[s,e], label:"SE", idx:2},
      {pos:[s,w], label:"SW", idx:3},
    ];
    const newMarkers = corners.map(({pos, label, idx}) => {
      const icon = L.divIcon({
        className:"",
        html:`<div style="width:20px;height:20px;border-radius:50%;background:#7EC850;border:2px solid #1A4A0E;display:flex;align-items:center;justify-content:center;cursor:move;font-size:8px;font-weight:900;color:#0f1a0f;box-shadow:0 1px 5px rgba(0,0,0,0.6)">${label}</div>`,
        iconSize:[20,20], iconAnchor:[10,10]
      });
      const marker = L.marker(pos, {icon, draggable:true, zIndexOffset:1000}).addTo(map);
      marker.on("drag", () => {
        // Recalculate bounds from all 4 corner positions
        const positions = newMarkers.map((m,i) => i===idx ? marker.getLatLng() : m.getLatLng());
        // NW=0, NE=1, SE=2, SW=3
        const newN = Math.max(positions[0].lat, positions[1].lat);
        const newS = Math.min(positions[2].lat, positions[3].lat);
        const newW = Math.min(positions[0].lng, positions[3].lng);
        const newE = Math.max(positions[1].lng, positions[2].lng);
        const nb = [[newS, newW],[newN, newE]];
        if (overlayRef.current) overlayRef.current.setBounds(nb);
      });
      marker.on("dragend", () => {
        const positions = newMarkers.map(m => m.getLatLng());
        const newN = Math.max(positions[0].lat, positions[1].lat);
        const newS = Math.min(positions[2].lat, positions[3].lat);
        const newW = Math.min(positions[0].lng, positions[3].lng);
        const newE = Math.max(positions[1].lng, positions[2].lng);
        setOverlayBounds([[newS,newW],[newN,newE]]);
      });
      return marker;
    });
    cornerMarkersRef.current = newMarkers;
  };

  // Rebuild overlay whenever relevant state changes while map tab is active
  useEffect(() => {
    if (activeTab !== 5) return;
    const L = window.L;
    const map = leafletMapRef.current;
    if (!L || !map || !overlayImg) return;
    buildOverlay(L, map, overlayImg, overlayBounds, overlayOpacity, overlayVisible);
  }, [activeTab, overlayImg, overlayBounds, overlayOpacity, overlayVisible]);

  const removeOverlay = () => {
    const map = leafletMapRef.current;
    if (overlayRef.current && map) { try { map.removeLayer(overlayRef.current); } catch(e){} }
    cornerMarkersRef.current.forEach(m => { try { map.removeLayer(m); } catch(e){} });
    cornerMarkersRef.current = [];
    overlayRef.current = null;
    setOverlayImg(null);
    setOverlayBounds(null);
    setOverlayName("");
  };

  const fitOverlay = () => {
    if (overlayBounds && leafletMapRef.current) {
      leafletMapRef.current.fitBounds(overlayBounds, {padding:[40,40]});
    }
  };

  const compassDir = (deg) => {
    if (deg == null) return "";
    const dirs = ["N","NE","E","SE","S","SW","W","NW"];
    return dirs[Math.round(deg/45) % 8];
  };

  const startCam = async () => {
    try {
      // Request compass permission on iOS
      if (typeof DeviceOrientationEvent?.requestPermission === "function") {
        const perm = await DeviceOrientationEvent.requestPermission();
        if (perm === "granted") {
          window.addEventListener("deviceorientation", (e) => {
            const h = e.webkitCompassHeading ?? e.alpha;
            if (h != null) setCompassHeading(Math.round(h));
          }, true);
        }
      }
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: { ideal: 3840 }, height: { ideal: 2160 } },
        audio: false
      });
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        videoRef.current.play();
      }
      setCamActive(true);
    } catch(err) {
      alert("Camera error: " + err.message);
    }
  };

  const stopCam = () => {
    if (videoRef.current?.srcObject) {
      videoRef.current.srcObject.getTracks().forEach(t => t.stop());
      videoRef.current.srcObject = null;
    }
    setCamActive(false);
  };

  const capturePhoto = () => {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if (!video || !canvas) return;
    const W = video.videoWidth  || 1280;
    const H = video.videoHeight || 720;
    canvas.width  = W;
    canvas.height = H;
    const ctx = canvas.getContext("2d");

    // Draw video frame
    ctx.drawImage(video, 0, 0, W, H);

    // ── Overlay setup ────────────────────────────────────────────────────
    const pad    = W * 0.018;
    const fSize  = Math.max(18, Math.round(W * 0.022));
    const lineH  = fSize * 1.55;
    const indexVal = photoMode === "auto"
      ? (tree.id || "—")
      : (photoIndexManual || "—");

    // Build overlay lines
    const now    = new Date();
    const dateStr = now.toLocaleDateString("en-US",{month:"short",day:"2-digit",year:"numeric"});
    const timeStr = now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    const latStr  = tree.lat
      ? `${Math.abs(parseFloat(tree.lat)).toFixed(4)}${parseFloat(tree.lat)>=0?"N":"S"}`
      : "GPS—";
    const lngStr  = tree.lng
      ? `${Math.abs(parseFloat(tree.lng)).toFixed(4)}${parseFloat(tree.lng)>=0?"E":"W"}`
      : "";
    const gpsLine = tree.lat ? `${latStr} ${lngStr}` : "GPS not captured";
    const compLine= compassHeading != null
      ? `${compassHeading}° ${compassDir(compassHeading)}`
      : "";
    const lines = [
      `${dateStr}  ${timeStr}`,
      gpsLine,
      ...(compLine ? [compLine] : []),
      `Index number: ${indexVal}`
    ];

    // Right-side text block
    ctx.font = `bold ${fSize}px Arial`;
    const maxW = lines.reduce((mx,l) => Math.max(mx, ctx.measureText(l).width), 0);
    const boxH = lines.length * lineH + pad * 1.5;
    const boxW = maxW + pad * 2;
    const bx   = W - boxW - pad;
    const by   = H - boxH - pad;

    ctx.fillStyle = "rgba(0,0,0,0.52)";
    ctx.beginPath();
    ctx.roundRect(bx - pad*0.5, by - pad*0.5, boxW + pad, boxH + pad*0.5, 8);
    ctx.fill();

    ctx.fillStyle = "#FFFFFF";
    ctx.textAlign = "right";
    lines.forEach((line, i) => {
      const y = by + i * lineH + fSize;
      // Last line (index) in lime
      if (i === lines.length - 1) ctx.fillStyle = "#7EC850";
      else ctx.fillStyle = "#FFFFFF";
      ctx.fillText(line, W - pad - pad*0.5, y);
    });

    // ── Logo bottom-left ─────────────────────────────────────────────────
    const logoImg = new window.Image();
    logoImg.onload = () => {
      const logoH = Math.round(H * 0.09);
      const logoW = Math.round(logoH * (800/371));
      const lx = pad;
      const ly = H - logoH - pad;

      // Logo backing box
      ctx.fillStyle = "rgba(0,0,0,0.50)";
      ctx.beginPath();
      ctx.roundRect(lx - 6, ly - 6, logoW + 12, logoH + 12, 8);
      ctx.fill();

      ctx.drawImage(logoImg, lx, ly, logoW, logoH);

      // ── Save to tree record ─────────────────────────────────────────
      const dataUrl = canvas.toDataURL("image/jpeg", 0.92);
      const photoMeta = {
        dataUrl,
        indexVal,
        timestamp: `${dateStr} ${timeStr}`,
        lat: tree.lat,
        lng: tree.lng,
        compass: compLine,
        id: Date.now()
      };
      setTree(t => ({ ...t, photos: [...(t.photos||[]), photoMeta] }));

      // Flash effect
      setPhotoFlash(true);
      setTimeout(() => setPhotoFlash(false), 180);
    };
    logoImg.src = LOGO_B64;
  };


  const allSpecies = [...SPECIES_LIST, ...customSpecies.map(s=>({...s,custom:true}))]
    .sort((a,b) => a.common.localeCompare(b.common));
  const filteredSpecies = allSpecies.filter(sp =>
    sp.common.toLowerCase().includes(speciesSearch.toLowerCase()) ||
    sp.botanical.toLowerCase().includes(speciesSearch.toLowerCase())
  );
  const selectSpecies = sp => {
    update("species_common", sp.common);
    update("species_scientific", sp.botanical);
    setSpeciesSearch(""); setShowSpeciesList(false);
  };
  const addCustomSpecies = () => {
    if (!newCommon.trim()) return;
    const e = {common:newCommon.trim(), botanical:newBotanical.trim()};
    setCustomSpecies(c => [...c, e]);
    selectSpecies(e);
    setNewCommon(""); setNewBotanical(""); setShowAddSpecies(false);
  };
  const autoAssignID = () => { update("id",`TMD-${nextID}`); setNextID(n=>n+1); };

  const saveRecord = () => {
    if (!tree.id || !tree.species_common) return;
    const record = {...tree, timestamp: new Date().toLocaleString(), photos: tree.photos||[]};
    setRecords(r => {
      const idx = r.findIndex(x => x.id === record.id);
      if (idx >= 0) { const u=[...r]; u[idx]=record; return u; }
      return [...r, record];
    });
    setSaved(true); setTimeout(()=>setSaved(false),2000);
    setTree(emptyTree()); setActiveTab(0);
  };

  const exportCSV = () => {
    if (!records.length) return;
    const headers = [
      "Tree ID","Buffer ID","Phase",
      "Address","APN",
      "Species (Common)","Species (Scientific)",
      "DBH (in)","Height (ft)",
      "Health Condition","Structural Condition",
      "Pests/Disease","Defects","Suitability",
      "Pruning Type","Pruning Priority","Treatment",
      "Removal Recommended","Removal Reason",
      "Stake Action","Tree Well Action",
      "Irrigation Method","Irrigation Frequency",
      "Comments","Latitude","Longitude","Timestamp","Photo Count"
    ];
    const rows = records.map(r =>
      [r.id, r.bufferID, r.phase,
       r.address, r.apn,
       r.species_common, r.species_scientific, r.dbh, r.height,
       r.health_condition, r.structural_condition,
       r.pests.join("; "), r.defects.join("; "), r.suitability,
       r.pruning_type, r.pruning_priority, r.treatment,
       r.removal_recommended?"YES":"No", r.removal_reason,
       r.stake_action, r.tree_well_action,
       r.irrigation_method, r.irrigation_frequency,
       r.comments, r.lat, r.lng, r.timestamp, (r.photos||[]).length]
      .map(v => `"${String(v??"").replace(/"/g,'""')}"`)
    );
    const csv = [headers.join(","), ...rows.map(r=>r.join(","))].join("\n");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    a.download = `monarch_dunes_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  const exportKML = () => {
    if (!records.length) return;
    const placemarks = records.filter(r=>r.lat&&r.lng).map(r=>`
    <Placemark><n>${r.id}</n>
      <description><![CDATA[
        <b>${r.species_common}</b><br/>
        <i>${r.species_scientific||""}</i><br/><br/>
        <b>Address:</b> ${r.address||"—"}<br/>
        <b>APN:</b> ${r.apn||"—"}<br/>
        <b>Phase:</b> ${r.phase} &nbsp;|&nbsp; <b>Buffer:</b> ${r.bufferID||"—"}<br/>
        <b>DBH:</b> ${r.dbh||"—"}" &nbsp;|&nbsp; <b>Ht:</b> ${r.height||"—"}ft<br/>
        <b>Condition:</b> ${r.health_condition||"—"}<br/>
        ${r.removal_recommended?"<b style='color:red'>⚠ REMOVAL RECOMMENDED</b><br/>":""}
        ${r.comments?`<i>${r.comments}</i>`:""}
      ]]></description>
      <Point><coordinates>${r.lng},${r.lat},0</coordinates></Point>
    </Placemark>`).join("");
    const kml = `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n  <Document><n>Monarch Dunes Tree Inventory</n>${placemarks}\n  </Document>\n</kml>`;
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([kml],{type:"application/vnd.google-earth.kml+xml"}));
    a.download = "monarch_dunes.kml"; a.click();
  };

  const filteredRecords = records.filter(r =>
    (filterPhase==="All" || r.phase===filterPhase) &&
    (r.id.toLowerCase().includes(searchTerm.toLowerCase()) ||
     r.species_common.toLowerCase().includes(searchTerm.toLowerCase()) ||
     r.bufferID.toLowerCase().includes(searchTerm.toLowerCase()) ||
     (r.address||"").toLowerCase().includes(searchTerm.toLowerCase()) ||
     (r.apn||"").toLowerCase().includes(searchTerm.toLowerCase()))
  );

  useEffect(() => {
    if (activeTab !== 5) return;
    const L = window.L;
    if (!L || !mapRef.current) return;
    if (!leafletMapRef.current) {
      const map = L.map(mapRef.current,{zoomControl:true}).setView([35.0505,-120.6080],16);
      const layerCfg = TILE_LAYERS[mapLayer]||TILE_LAYERS.street;
      const tl = L.tileLayer(layerCfg.url,{attribution:layerCfg.attribution,maxZoom:layerCfg.maxZoom||20});
      tl.addTo(map);
      tileLayerRef.current = tl;
      if (layerCfg.overlay) {
        L.tileLayer(layerCfg.overlay,{attribution:"",maxZoom:20,opacity:0.45}).addTo(map);
      }
      leafletMapRef.current = map;
    } else {
      // Swap tile layer if it changed
      const layerCfg = TILE_LAYERS[mapLayer]||TILE_LAYERS.street;
      if (tileLayerRef.current) {
        leafletMapRef.current.eachLayer(l => { if(l._url) leafletMapRef.current.removeLayer(l); });
      }
      const tl = L.tileLayer(layerCfg.url,{attribution:layerCfg.attribution,maxZoom:layerCfg.maxZoom||20});
      tl.addTo(leafletMapRef.current);
      tileLayerRef.current = tl;
      if (layerCfg.overlay) {
        L.tileLayer(layerCfg.overlay,{attribution:"",maxZoom:20,opacity:0.45}).addTo(leafletMapRef.current);
      }
    }
    Object.values(markersRef.current).forEach(m=>m.remove());
    markersRef.current = {};
    const spMap = {}; let ci=0;
    records.forEach(r => { if(r.species_common&&!spMap[r.species_common]) spMap[r.species_common]=SPECIES_PALETTE[ci++%SPECIES_PALETTE.length]; });
    const condC = {"1-Poor":"#dc2626","2-Fair":"#ea580c","3-Good":"#ca8a04","4-VeryGood":"#65a30d","5-Excellent":"#16a34a"};
    records.forEach(rec => {
      if (!rec.lat||!rec.lng) return;
      const color = mapColorMode==="species"?(spMap[rec.species_common]||"#6b7280"):(condC[rec.health_condition]||"#6b7280");
      const icon = L.divIcon({className:"",html:`<div style="width:13px;height:13px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 1px 5px rgba(0,0,0,0.6);cursor:grab;"></div>`,iconSize:[13,13],iconAnchor:[6,6]});
      const marker = L.marker([parseFloat(rec.lat),parseFloat(rec.lng)],{icon,draggable:true,title:rec.id});
      marker.bindPopup(`<div style="font-family:monospace;font-size:12px;min-width:190px;line-height:1.6">
        <b>${rec.id}</b><br/>
        <span style="color:${spMap[rec.species_common]||'#888'}">⬤</span> <em>${rec.species_common||"Unknown"}</em><br/>
        <span style="color:#888;font-size:10px;font-style:italic">${rec.species_scientific||""}</span><br/>
        ${rec.address?`<b>📍</b> ${rec.address}<br/>`:""}
        ${rec.apn?`<b>APN:</b> ${rec.apn}<br/>`:""}
        Phase ${rec.phase} · Buffer ${rec.bufferID||"—"}<br/>
        DBH: ${rec.dbh||"—"}" · Ht: ${rec.height||"—"}ft<br/>
        <span style="color:${condC[rec.health_condition]||'#888'}">⬤</span> ${rec.health_condition||"Not rated"}<br/>
        ${rec.removal_recommended?'<b style="color:#dc2626">⚠ REMOVAL RECOMMENDED</b><br/>':''}
        <small style="color:#aaa">Drag to adjust GPS position</small>
      </div>`);
      marker.on("click",()=>setSelectedMapRecord(rec));
      marker.on("dragend",e=>{
        const {lat,lng}=e.target.getLatLng();
        setRecords(prev=>prev.map(r=>r.id===rec.id?{...r,lat:lat.toFixed(6),lng:lng.toFixed(6)}:r));
        setSelectedMapRecord(s=>s&&s.id===rec.id?{...s,lat:lat.toFixed(6),lng:lng.toFixed(6)}:s);
      });
      marker.addTo(leafletMapRef.current);
      markersRef.current[rec.id]=marker;
    });
    setTimeout(()=>leafletMapRef.current&&leafletMapRef.current.invalidateSize(),120);
  },[activeTab,records,mapColorMode,mapLayer]);

  const inp = {width:"100%",background:T.surface2,border:`1px solid ${T.borderStrong}`,borderRadius:4,color:T.text,padding:"7px 9px",fontSize:13,fontFamily:"'DM Mono',monospace",boxSizing:"border-box"};
  const card     = {background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:13,marginBottom:10};
  const lbl      = {fontSize:10,color:T.textMid,fontWeight:800,letterSpacing:0.8,marginBottom:3,display:"block",textTransform:"uppercase"};
  const fld      = {marginBottom:9};
  const row2     = {display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:9};
  const secTitle = {fontSize:11,fontWeight:700,color:T.accent,marginBottom:8,paddingBottom:5,borderBottom:`1px solid ${T.border}`,letterSpacing:0.8,textTransform:"uppercase"};
  const btn = (color=T.accent,bg=T.accentBg) => ({background:bg,border:`1px solid ${color}`,color,padding:"7px 13px",borderRadius:4,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"'DM Mono',monospace"});
  const checkItem = chk => ({display:"flex",alignItems:"center",gap:5,padding:"5px 7px",background:chk?T.accentBg:T.surface2,border:`1px solid ${chk?T.accent:T.border}`,borderRadius:4,cursor:"pointer",fontSize:11,color:chk?T.accent:T.textMid});
  const badge = color => ({background:color+"22",border:`1px solid ${color}55`,color,padding:"1px 5px",borderRadius:3,fontSize:9,fontWeight:700});
  const progBar = pct => ({height:3,background:`linear-gradient(90deg,${T.accent} ${pct}%,${T.border} ${pct}%)`,borderRadius:2});
  const phaseProgress = PHASES.map(p=>({phase:p,count:records.filter(r=>r.phase===p).length,total:PHASE_COUNTS[p]}));
  const gpsLabel = gpsStatus==="loading"?"⏳ Locating + Address…":gpsStatus==="ok"?"✅ GPS + Address Captured":gpsStatus==="error"?"❌ GPS Failed":"📍 Capture GPS + Address";
  const gpsBtnColor = gpsStatus==="ok"?"#16a34a":gpsStatus==="error"?T.danger:T.accent;
  const spColorMap = {}; let spci=0;
  records.forEach(r=>{if(r.species_common&&!spColorMap[r.species_common])spColorMap[r.species_common]=SPECIES_PALETTE[spci++%SPECIES_PALETTE.length];});
  const condColorsMap = {"1-Poor":"#dc2626","2-Fair":"#ea580c","3-Good":"#ca8a04","4-VeryGood":"#65a30d","5-Excellent":"#16a34a"};

  return (
    <div style={{fontFamily:"'DM Mono','Courier New',monospace",background:T.bg,height:"100vh",display:"flex",flexDirection:"column",color:T.text,fontSize:14,overflow:"hidden"}}>
      <style>{`input::placeholder,textarea::placeholder{color:${T.textDim}} select option{background:${T.surface2};color:${T.text}}`}</style>

      {/* HEADER */}
      <div style={{background:T.headerBg,borderBottom:`2px solid ${T.headerBorder}`,padding:"10px 13px",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
          <div>
            <div style={{fontSize:17,fontWeight:700,color:T.accent,letterSpacing:0.8}}>🌲 ArborField Pro</div>
            <div style={{fontSize:10,color:T.textMid,marginTop:1}}>Monarch Dunes · ArborSolutions.pro</div>
          </div>
          <button onClick={()=>setDark(d=>!d)} style={{background:T.surface2,border:`1px solid ${T.border}`,color:T.textMid,borderRadius:16,padding:"4px 10px",cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace"}}>
            {dark?"☀️ Light":"🌙 Dark"}
          </button>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {phaseProgress.map(p=>(
            <div key={p.phase} style={{flex:1,minWidth:52}}>
              <div style={{fontSize:9,color:T.textMid,marginBottom:2}}>{p.phase}: {p.count}/{p.total}</div>
              <div style={progBar(Math.round((p.count/p.total)*100))}/>
            </div>
          ))}
        </div>
        <div style={{fontSize:9,color:T.textMid,marginTop:5}}>{records.length} / 1,339 recorded ({Math.round((records.length/1339)*100)}%)</div>
      </div>

      {/* TABS */}
      <div style={{display:"flex",background:T.tabBg,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        {TABS.map((t,i)=>(
          <button key={i} onClick={()=>setActiveTab(i)} style={{flex:1,padding:"8px 2px",cursor:"pointer",fontSize:10,fontWeight:600,background:"none",border:"none",borderBottom:activeTab===i?`3px solid ${T.accent}`:"3px solid transparent",color:activeTab===i?T.accent:T.textMid,fontFamily:"'DM Mono',monospace"}}>
            {t}
          </button>
        ))}
      </div>

      {/* CONTENT */}
      <div style={{flex:1,overflowY:activeTab===5?"hidden":"auto",position:"relative"}}>
        <div style={{padding:activeTab===5?"0":"11px 11px 80px"}}>

          {saved && <div style={{background:T.savedBg,border:`1px solid ${T.accent}`,color:T.accent,padding:"6px 11px",borderRadius:5,fontSize:12,textAlign:"center",marginBottom:8,fontWeight:700}}>✅ Record saved</div>}

          {/* ── TAB 0: ID ── */}
          {activeTab===0 && (<>

            <div style={card}>
              <div style={secTitle}>Tree Identification</div>
              <div style={row2}>
                <div style={fld}>
                  <label style={lbl}>Phase</label>
                  <select style={inp} value={tree.phase} onChange={e=>update("phase",e.target.value)}>
                    {PHASES.map(p=><option key={p} value={p}>Phase {p}</option>)}
                  </select>
                </div>
                <div style={fld}>
                  <label style={lbl}>Buffer ID (SBTF)</label>
                  <input style={inp} value={tree.bufferID} onChange={e=>update("bufferID",e.target.value)} placeholder="e.g. 1A-042"/>
                </div>
              </div>
              <div style={fld}>
                <label style={lbl}>Tree ID</label>
                <div style={{display:"flex",gap:7}}>
                  <input style={{...inp,flex:1}} value={tree.id} onChange={e=>update("id",e.target.value)} placeholder="e.g. TMD-1200"/>
                  <button style={btn()} onClick={autoAssignID}>AUTO</button>
                </div>
                <div style={{fontSize:9,color:T.textDim,marginTop:2}}>Next: TMD-{nextID}</div>
              </div>
            </div>

            {/* ── PARCEL INFORMATION ── */}
            <div style={card}>
              <div style={secTitle}>Parcel Information</div>
              <div style={fld}>
                <label style={lbl}>Full Street Address <span style={{fontSize:9,color:T.accent,fontStyle:"italic",fontWeight:400}}>(auto-filled from GPS · editable)</span></label>
                <input style={inp} value={tree.address} onChange={e=>update("address",e.target.value)} placeholder="e.g. 1234 Trilogy Pkwy, Nipomo CA 93444"/>
              </div>
              <div style={fld}>
                <label style={lbl}>APN — Assessor's Parcel Number</label>
                <input style={inp} value={tree.apn} onChange={e=>update("apn",e.target.value)} placeholder="e.g. 091-480-012" inputMode="numeric"/>
                <div style={{fontSize:9,color:T.textDim,marginTop:3}}>SLO County format: NNN-NNN-NNN · Look up at slocounty.ca.gov/assessor</div>
              </div>
            </div>

            {/* SPECIES */}
            <div style={card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,paddingBottom:5,borderBottom:`1px solid ${T.border}`}}>
                <div style={{fontSize:11,fontWeight:700,color:T.accent,letterSpacing:0.8,textTransform:"uppercase"}}>Species</div>
                <button onClick={()=>{setShowAddSpecies(s=>!s);setShowSpeciesList(false);}}
                  style={{background:T.accentBg,border:`1px solid ${T.accent}`,color:T.accent,borderRadius:3,padding:"2px 8px",cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>
                  {showAddSpecies?"✕ Cancel":"+ Add to List"}
                </button>
              </div>
              {showAddSpecies && (
                <div style={{background:T.surface2,border:`1px solid ${T.borderStrong}`,borderRadius:5,padding:10,marginBottom:10}}>
                  <div style={{fontSize:10,color:T.accent,fontWeight:700,marginBottom:7,textTransform:"uppercase"}}>Add New Species</div>
                  <div style={row2}>
                    <div style={fld}>
                      <label style={lbl}>Common Name *</label>
                      <input style={inp} value={newCommon} onChange={e=>setNewCommon(e.target.value)} placeholder="e.g. Blue Oak"/>
                    </div>
                    <div style={fld}>
                      <label style={lbl}>Botanical Name</label>
                      <input style={{...inp,fontStyle:"italic"}} value={newBotanical} onChange={e=>setNewBotanical(e.target.value)} placeholder="e.g. Quercus douglasii"/>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:7}}>
                    <button style={{...btn(),flex:1}} onClick={addCustomSpecies} disabled={!newCommon.trim()}>✅ Add & Select</button>
                    <button style={btn(T.textMid,T.surface2)} onClick={()=>{setShowAddSpecies(false);setNewCommon("");setNewBotanical("");}}>Cancel</button>
                  </div>
                </div>
              )}
              {!showAddSpecies && (
                <div style={fld}>
                  <label style={lbl}>Search Species {customSpecies.length>0&&<span style={{color:T.textDim}}>· {customSpecies.length} custom</span>}</label>
                  <div style={{position:"relative"}}>
                    <input style={inp} placeholder="Type common or botanical name…" value={speciesSearch}
                      onChange={e=>{setSpeciesSearch(e.target.value);setShowSpeciesList(true);}}
                      onFocus={()=>setShowSpeciesList(true)}/>
                    {showSpeciesList && speciesSearch.length>0 && (
                      <div style={{position:"absolute",top:"100%",left:0,right:0,background:T.surface,border:`1px solid ${T.borderStrong}`,borderRadius:4,marginTop:2,maxHeight:170,overflowY:"auto",zIndex:20,boxShadow:"0 4px 12px rgba(0,0,0,0.3)"}}>
                        {filteredSpecies.length===0 ? (
                          <div style={{padding:"8px 10px"}}>
                            <div style={{fontSize:11,color:T.textDim,marginBottom:6}}>No match found.</div>
                            <button style={{...btn(),fontSize:11,padding:"5px 10px",width:"100%"}}
                              onClick={()=>{setNewCommon(speciesSearch);setShowSpeciesList(false);setShowAddSpecies(true);setSpeciesSearch("");}}>
                              + Add "{speciesSearch}" to list
                            </button>
                          </div>
                        ) : filteredSpecies.map(sp=>(
                          <div key={sp.common+sp.botanical} onClick={()=>selectSpecies(sp)}
                            style={{padding:"6px 10px",cursor:"pointer",borderBottom:`1px solid ${T.border}`}}
                            onMouseEnter={e=>e.currentTarget.style.background=T.accentBg}
                            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                            <div style={{color:T.text,fontSize:12,fontWeight:600}}>{sp.common}{sp.custom&&<span style={{fontSize:9,color:T.accent,marginLeft:5}}>CUSTOM</span>}</div>
                            <div style={{color:T.textMid,fontSize:10,fontStyle:"italic"}}>{sp.botanical}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              )}
              <div style={row2}>
                <div style={fld}>
                  <label style={lbl}>Common Name</label>
                  <input style={inp} value={tree.species_common} onChange={e=>update("species_common",e.target.value)} placeholder="Common name"/>
                </div>
                <div style={fld}>
                  <label style={lbl}>Botanical Name</label>
                  <input style={{...inp,fontStyle:"italic"}} value={tree.species_scientific} onChange={e=>update("species_scientific",e.target.value)} placeholder="Genus species"/>
                </div>
              </div>
              <div style={row2}>
                <div style={fld}>
                  <label style={lbl}>DBH (inches)</label>
                  <input style={inp} type="number" value={tree.dbh} onChange={e=>update("dbh",e.target.value)} placeholder="e.g. 5.5"/>
                </div>
                <div style={fld}>
                  <label style={lbl}>Height (feet)</label>
                  <input style={inp} type="number" value={tree.height} onChange={e=>update("height",e.target.value)} placeholder="e.g. 18"/>
                </div>
              </div>
            </div>

            {/* GPS */}
            <div style={card}>
              <div style={secTitle}>GPS Location</div>
              <div style={row2}>
                <div style={fld}>
                  <label style={lbl}>Latitude</label>
                  <input style={inp} value={tree.lat} onChange={e=>update("lat",e.target.value)} placeholder="35.123456"/>
                </div>
                <div style={fld}>
                  <label style={lbl}>Longitude</label>
                  <input style={inp} value={tree.lng} onChange={e=>update("lng",e.target.value)} placeholder="-120.123456"/>
                </div>
              </div>
              <button style={{...btn(gpsBtnColor,T.accentBg),width:"100%"}} onClick={getLocation} disabled={gpsStatus==="loading"}>{gpsLabel}</button>
              {tree.lat&&tree.lng&&<div style={{marginTop:6,fontSize:10,color:T.accent}}>📌 {tree.lat}, {tree.lng} · <a href={`https://maps.google.com/?q=${tree.lat},${tree.lng}`} target="_blank" rel="noreferrer" style={{color:T.accent}}>View ↗</a></div>}
            </div>
          </>)}

          {/* ── TAB 1: ASSESS ── */}
          {activeTab===1 && (<>
            <div style={card}>
              <div style={secTitle}>Health Condition</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {CONDITION_OPTIONS.map(opt=>(
                  <button key={opt.value} onClick={()=>update("health_condition",opt.value)}
                    style={{padding:"6px 10px",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:700,background:tree.health_condition===opt.value?opt.color+"33":T.surface2,border:`2px solid ${tree.health_condition===opt.value?opt.color:T.border}`,color:tree.health_condition===opt.value?opt.color:T.textMid,fontFamily:"'DM Mono',monospace"}}>
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>
            <div style={card}>
              <div style={secTitle}>Structural Condition</div>
              <select style={inp} value={tree.structural_condition} onChange={e=>update("structural_condition",e.target.value)}>
                <option value="">Select…</option>
                <option value="Sound">Sound – No apparent defects</option>
                <option value="Minor Defects">Minor Defects – Low risk</option>
                <option value="Moderate Defects">Moderate Defects – Monitor</option>
                <option value="Significant Defects">Significant Defects – Action Required</option>
                <option value="Hazardous">Hazardous – Immediate Action</option>
              </select>
            </div>
            <div style={card}>
              <div style={secTitle}>Pests / Disease</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
                {PEST_DISEASE.map(p=>(<div key={p} style={checkItem(tree.pests.includes(p))} onClick={()=>toggleArr("pests",p)}><span>{tree.pests.includes(p)?"☑":"☐"}</span>{p}</div>))}
              </div>
            </div>
            <div style={card}>
              <div style={secTitle}>Structural Defects</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
                {DEFECTS.map(d=>(<div key={d} style={checkItem(tree.defects.includes(d))} onClick={()=>toggleArr("defects",d)}><span>{tree.defects.includes(d)?"☑":"☐"}</span>{d}</div>))}
              </div>
            </div>
            <div style={card}>
              <div style={secTitle}>Suitability for Location</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {["Suitable","Marginal – Monitor","Unsuitable – Remove"].map(opt=>(
                  <button key={opt} onClick={()=>update("suitability",opt)}
                    style={{padding:"6px 10px",cursor:"pointer",borderRadius:4,fontSize:11,fontWeight:700,background:tree.suitability===opt?T.accentBg:T.surface2,border:`1px solid ${tree.suitability===opt?T.accent:T.border}`,color:tree.suitability===opt?T.accent:T.textMid,fontFamily:"'DM Mono',monospace"}}>
                    {opt}
                  </button>
                ))}
              </div>
            </div>
          </>)}

          {/* ── TAB 2: RECS ── */}
          {activeTab===2 && (<>
            <div style={card}>
              <div style={secTitle}>Pruning (ANSI A300)</div>
              <div style={fld}><label style={lbl}>Method</label>
                <select style={inp} value={tree.pruning_type} onChange={e=>update("pruning_type",e.target.value)}>
                  <option value="">Select…</option>{PRUNING_TYPES.map(p=><option key={p} value={p}>{p}</option>)}
                </select>
              </div>
              <div style={fld}><label style={lbl}>Priority / Phase</label>
                <select style={inp} value={tree.pruning_priority} onChange={e=>update("pruning_priority",e.target.value)}>
                  <option value="">Select…</option>{PRIORITY_LEVELS.map(p=><option key={p} value={p}>{p}</option>)}
                </select>
              </div>
            </div>
            <div style={card}>
              <div style={secTitle}>Treatment & Removal</div>
              <div style={fld}><label style={lbl}>Pest / Disease Treatment</label>
                <input style={inp} value={tree.treatment} onChange={e=>update("treatment",e.target.value)} placeholder="e.g. Soil drench imidacloprid"/>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,padding:8,background:tree.removal_recommended?T.dangerBg:T.surface2,border:`1px solid ${tree.removal_recommended?T.danger:T.border}`,borderRadius:4}}>
                <input type="checkbox" id="removal" checked={tree.removal_recommended} onChange={e=>update("removal_recommended",e.target.checked)} style={{width:14,height:14,accentColor:T.danger}}/>
                <label htmlFor="removal" style={{color:tree.removal_recommended?T.danger:T.textMid,fontWeight:700,fontSize:12,cursor:"pointer"}}>⚠️ Removal Recommended</label>
              </div>
              {tree.removal_recommended&&<div style={fld}><label style={lbl}>Reason + Replacement Rec.</label>
                <textarea style={{...inp,height:52}} value={tree.removal_reason} onChange={e=>update("removal_reason",e.target.value)} placeholder="e.g. Hazardous lean – replace with Toyon"/>
              </div>}
            </div>
            <div style={card}>
              <div style={secTitle}>Infrastructure</div>
              <div style={row2}>
                <div style={fld}><label style={lbl}>Stake Action</label>
                  <select style={inp} value={tree.stake_action} onChange={e=>update("stake_action",e.target.value)}>
                    {["No Action","Remove Stakes","Add Stakes","Adjust Stakes"].map(o=><option key={o} value={o}>{o}</option>)}
                  </select>
                </div>
                <div style={fld}><label style={lbl}>Tree Well Action</label>
                  <select style={inp} value={tree.tree_well_action} onChange={e=>update("tree_well_action",e.target.value)}>
                    {["No Action","Add Tree Well","Modify Tree Well","Remove Tree Well"].map(o=><option key={o} value={o}>{o}</option>)}
                  </select>
                </div>
              </div>
            </div>
            <div style={card}>
              <div style={secTitle}>Irrigation</div>
              <div style={row2}>
                <div style={fld}><label style={lbl}>Method</label>
                  <select style={inp} value={tree.irrigation_method} onChange={e=>update("irrigation_method",e.target.value)}>
                    <option value="">Select…</option>{IRRIGATION_METHODS.map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
                <div style={fld}><label style={lbl}>Frequency</label>
                  <input style={inp} value={tree.irrigation_frequency} onChange={e=>update("irrigation_frequency",e.target.value)} placeholder="e.g. Weekly May–Oct"/>
                </div>
              </div>
            </div>
            <div style={card}>
              <div style={secTitle}>Field Notes</div>
              <div style={fld}><label style={lbl}>Comments / Observations</label>
                <textarea style={{...inp,height:68}} value={tree.comments} onChange={e=>update("comments",e.target.value)} placeholder="Sidewalk conflict, root heaving, staking issues…"/>
              </div>
              <div style={fld}><label style={lbl}>Photo Reference</label>
                <input style={inp} value={tree.photo_note} onChange={e=>update("photo_note",e.target.value)} placeholder="e.g. IMG_0421 – trunk canker"/>
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button style={{...btn(T.accent,T.accentBg),flex:1,padding:"10px"}} onClick={saveRecord} disabled={!tree.id||!tree.species_common}>✅ SAVE RECORD</button>
              <button style={btn(T.textMid,T.surface2)} onClick={()=>setTree(emptyTree())}>🗑️ Clear</button>
            </div>
            {(!tree.id||!tree.species_common)&&<div style={{fontSize:10,color:T.danger,marginTop:4,textAlign:"center"}}>Tree ID and species required</div>}
          </>)}

          {/* ── TAB 3: RECORDS ── */}
          {activeTab===3 && (<>
            <div style={card}>
              <div style={{display:"flex",gap:7,marginBottom:7}}>
                <input style={{...inp,flex:1}} placeholder="Search ID, address, APN, species…" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
                <select style={{...inp,width:"auto"}} value={filterPhase} onChange={e=>setFilterPhase(e.target.value)}>
                  <option value="All">All</option>{PHASES.map(p=><option key={p} value={p}>{p}</option>)}
                </select>
              </div>
              <div style={{fontSize:10,color:T.textMid}}>{filteredRecords.length} records</div>
            </div>
            {filteredRecords.length===0&&<div style={{textAlign:"center",color:T.textDim,padding:28,fontSize:12}}>No records yet.</div>}
            {filteredRecords.map(r=>{
              const cond=CONDITION_OPTIONS.find(c=>c.value===r.health_condition);
              return (
                <div key={r.id} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:6,padding:10,marginBottom:7}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                    <div style={{flex:1}}>
                      <div>
                        <span style={{fontWeight:700,color:T.accent,fontSize:13}}>{r.id}</span>
                        <span style={{color:T.textDim,fontSize:10,marginLeft:7}}>Phase {r.phase} · {r.bufferID}</span>
                      </div>
                      {r.address&&<div style={{fontSize:11,color:T.textMid,marginTop:2}}>📍 {r.address}</div>}
                      {r.apn&&<div style={{fontSize:10,color:T.textDim}}>APN: {r.apn}</div>}
                    </div>
                    <div style={{display:"flex",gap:5,flexShrink:0,marginLeft:8}}>
                      <button style={{...btn(T.textMid,T.surface2),padding:"3px 8px",fontSize:11}} onClick={()=>{setTree(r);setActiveTab(0);}}>✏️</button>
                      <button style={{background:T.dangerBg,border:`1px solid ${T.danger}`,color:T.danger,padding:"3px 8px",borderRadius:3,cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace"}} onClick={()=>setRecords(rec=>rec.filter(x=>x.id!==r.id))}>✕</button>
                    </div>
                  </div>
                  <div style={{fontSize:12,color:T.text,marginBottom:3}}>
                    <span style={{color:spColorMap[r.species_common]||T.textMid}}>⬤ </span>
                    {r.species_common} · <span style={{color:T.textMid,fontStyle:"italic"}}>{r.species_scientific}</span>
                  </div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {r.dbh&&<span style={{fontSize:10,color:T.textMid}}>DBH {r.dbh}"</span>}
                    {r.height&&<span style={{fontSize:10,color:T.textMid}}>Ht {r.height}ft</span>}
                    {cond&&<span style={badge(cond.color)}>{r.health_condition}</span>}
                    {r.removal_recommended&&<span style={badge(T.danger)}>REMOVAL</span>}
                    {r.pruning_priority&&<span style={badge("#ca8a04")}>{r.pruning_priority}</span>}

                <div style={{position:"absolute",top:10,right:10,zIndex:1000,background:dark?"rgba(10,18,10,0.93)":"rgba(255,255,255,0.95)",border:`1px solid ${T.borderStrong}`,borderRadius:7,padding:"9px 11px",maxWidth:180,boxShadow:"0 2px 10px rgba(0,0,0,0.35)",maxHeight:"60vh",overflowY:"auto"}}>

                          <span style={{fontSize:9,color:T.textDim}}>{records.filter(r=>r.species_common===name&&r.lat).length}</span>

                      ))

                          <span style={{fontSize:9,color:T.textDim}}>{records.filter(r=>r.health_condition===cond&&r.lat).length}</span>
                        </div>
                      ))
                  }
                  <div style={{fontSize:9,color:T.textDim,marginTop:6,paddingTop:5,borderTop:`1px solid ${T.border}`}}>Drag marker to adjust position</div>
                </div>
                {selectedMapRecord&&(
                  <div style={{position:"absolute",bottom:10,left:10,right:10,zIndex:1000,background:dark?"rgba(10,18,10,0.95)":"rgba(255,255,255,0.97)",border:`1px solid ${T.borderStrong}`,borderRadius:7,padding:"9px 12px",boxShadow:"0 2px 12px rgba(0,0,0,0.4)"}}>

                        </label>
                        <div style={{fontSize:9,color:dark?"#666":"#999",marginTop:6,textAlign:"center"}}>
                          JPG · PNG · PDF screenshot · Any scale
                        </div>
                      </div>
                    ) : (
                      <div>
                        {/* File name */}
                        <div style={{fontSize:10,fontWeight:700,color:"#7EC850",marginBottom:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                          📄 {overlayName||"Site Plan"}
                        </div>

                        {/* Visible toggle */}
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                          <span style={{fontSize:10,color:dark?"#ccc":"#444",fontWeight:600}}>Visible</span>

                            {overlayVisible?"● ON":"○ OFF"}
                          </button>
                        </div>

                        {/* Opacity */}
                        <div style={{marginBottom:8}}>
                          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:dark?"#ccc":"#444",marginBottom:4}}>
                            <span style={{fontWeight:600}}>Opacity</span>
                            <span style={{color:"#7EC850",fontWeight:700}}>{Math.round(overlayOpacity*100)}%</span>
                          </div>
                          <input type="range" min={10} max={100} value={Math.round(overlayOpacity*100)}
                            onChange={e=>setOverlayOpacity(Number(e.target.value)/100)}
                            style={{width:"100%",accentColor:"#7EC850"}}/>
                        </div>

                        {/* Corner pin instructions */}
                        <div style={{background:"rgba(30,92,20,0.2)",border:"1px solid #2D5A1B",borderRadius:5,padding:"6px 8px",marginBottom:8}}>

                          <div style={{fontSize:9,color:dark?"#aaa":"#555",lineHeight:1.5}}>

                          </div>
                        </div>

                        <div style={{display:"flex",gap:6,marginBottom:8}}>

                            🎯 Fit View
                          </button>
                          <label style={{flex:1,background:"transparent",border:"1px solid #3A6B1A",color:"#6B8C2A",padding:"5px 8px",borderRadius:4,cursor:"pointer",fontSize:10,fontWeight:700,textAlign:"center",fontFamily:"'DM Mono',monospace"}}>
                            🔄 Replace
                            <input type="file" accept="image/*" style={{display:"none"}} onChange={handleOverlayUpload}/>
                          </label>
                        </div>

                        {/* Quick location presets */}
                        <div style={{marginBottom:8}}>
                          <div style={{fontSize:9,fontWeight:700,color:"#6B8C2A",marginBottom:5,textTransform:"uppercase",letterSpacing:0.6}}>Quick Center — Jump To</div>
                          <div style={{display:"flex",flexDirection:"column",gap:3}}>
                            {[
                              {label:"📍 Trilogy Monarch Dunes",   lat:35.0505, lng:-120.6080},
                              {label:"🏙️ Nipomo, CA",              lat:35.0447, lng:-120.4760},
                              {label:"🌿 Santa Barbara",           lat:34.4208, lng:-119.6982},
                              {label:"🌊 SLO — Downtown",         lat:35.2828, lng:-120.6596},
                              {label:"🏡 Orcutt",                 lat:34.8658, lng:-120.4357},
                              {label:"🌾 Lompoc",                 lat:34.6391, lng:-120.4579},
                              {label:"🏘️ Paso Robles",            lat:35.6269, lng:-120.6910},

                        <button onClick={removeOverlay}
                          style={{width:"100%",background:"transparent",border:`1px solid ${T.danger}`,color:T.danger,padding:"6px",borderRadius:4,cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>

                      </div>

                  </div>
                )}

                {records.length>0&&mapped===0&&(
                  <div style={{position:"absolute",bottom:10,left:"50%",transform:"translateX(-50%)",zIndex:1000,background:dark?"rgba(42,15,15,0.95)":"#fef2f2",border:`1px solid ${T.danger}`,borderRadius:6,padding:"8px 14px",fontSize:11,color:T.danger,fontWeight:700,whiteSpace:"nowrap"}}>
                    ⚠️ No GPS recorded yet — use 📍 Capture GPS in ID tab
                  </div>
                )}
              </div>
            );
          })()}

          {activeTab===6 && (()=>{
            const photoIndex = photoMode==="auto" ? (tree.id||"") : photoIndexManual;
            const photos = tree.photos || [];
            return (
              <div>
                {/* ── Index Mode Toggle ── */}
                <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:13,marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:8,paddingBottom:5,borderBottom:`1px solid ${T.border}`,letterSpacing:0.8,textTransform:"uppercase"}}>Photo Index Number</div>
                  <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>

                      <button key={m} onClick={()=>setPhotoMode(m)} style={{padding:"5px 14px",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:700,background:photoMode===m?T.accentBg:T.surface2,border:`1px solid ${photoMode===m?T.accent:T.border}`,color:photoMode===m?T.accent:T.textMid,fontFamily:"'DM Mono',monospace",textTransform:"capitalize"}}>
                        {m==="auto"?"🔗 Auto (Tree ID)":"✏️ Manual"}
                      </button>
                    ))}
                  </div>
                  {photoMode==="auto" ? (
                    <div style={{background:T.accentBg,border:`1px solid ${T.accent}`,borderRadius:5,padding:"8px 12px",fontSize:12}}>
                      <span style={{color:T.textMid}}>Synced to Tree ID: </span>
                      <span style={{color:T.accent,fontWeight:700,fontSize:14}}>{tree.id || <span style={{color:T.textDim,fontStyle:"italic"}}>No Tree ID set — go to 🌳 ID tab</span>}</span>
                    </div>
                  ) : (
                    <div>
                      <label style={{fontSize:10,color:T.textMid,fontWeight:800,letterSpacing:0.8,marginBottom:3,display:"block",textTransform:"uppercase"}}>Manual Index Number</label>

                {/* ── GPS & Compass status strip ── */}
                <div style={{background:T.surface2,border:`1px solid ${T.border}`,borderRadius:6,padding:"7px 12px",marginBottom:10,display:"flex",gap:16,flexWrap:"wrap",fontSize:11}}>
                  <span style={{color:tree.lat?T.accent:T.textDim}}>
                    📍 {tree.lat&&tree.lng ? `${tree.lat}, ${tree.lng}` : "No GPS — capture in 🌳 ID tab"}
                  </span>
                  <span style={{color:compassHeading!=null?T.accent:T.textDim}}>
                    🧭 {compassHeading!=null ? `${compassHeading}° ${compassDir(compassHeading)}` : "Compass unavailable"}

                </div>

                {/* ── Viewfinder ── */}
                <div style={{position:"relative",background:"#000",borderRadius:8,overflow:"hidden",marginBottom:10,border:`2px solid ${T.borderStrong}`}}>

                  {/* Live overlay preview */}
                  {camActive && (
                    <div style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,0.55)",borderRadius:6,padding:"5px 9px",textAlign:"right",pointerEvents:"none"}}>

                        {new Date().toLocaleDateString("en-US",{month:"short",day:"2-digit",year:"numeric"})}{"  "}{new Date().toLocaleTimeString()}<br/>
                        {tree.lat&&tree.lng?`${Math.abs(parseFloat(tree.lat)).toFixed(4)}${parseFloat(tree.lat)>=0?"N":"S"} ${Math.abs(parseFloat(tree.lng)).toFixed(4)}${parseFloat(tree.lng)>=0?"E":"W"}`:"GPS not captured"}<br/>
                        {compassHeading!=null?`${compassHeading}° ${compassDir(compassHeading)}`:""}
                        {compassHeading!=null&&<br/>}
                        <span style={{color:"#7EC850",fontWeight:700}}>Index number: {photoIndex||"—"}</span>
                      </div>
                    </div>
                  )}
                  {camActive && (
                    <div style={{position:"absolute",bottom:8,left:8,background:"rgba(0,0,0,0.50)",borderRadius:6,padding:4}}>

                    </div>

                  {photoFlash && <div style={{position:"absolute",inset:0,background:"rgba(255,255,255,0.7)",borderRadius:6,pointerEvents:"none"}}/>}

                    <div style={{padding:40,textAlign:"center"}}>
                      <div style={{fontSize:48,marginBottom:12}}>📷</div>

                      <button style={{background:T.accentBg,border:`1px solid ${T.accent}`,color:T.accent,padding:"10px 24px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'DM Mono',monospace"}}

                {/* ── Capture / Stop row ── */}

                  <div style={{display:"flex",gap:10,marginBottom:14}}>
                    <button onClick={capturePhoto}
                      style={{flex:1,background:T.accent,border:"none",color:"#0f1a0f",padding:"14px",borderRadius:8,cursor:"pointer",fontSize:15,fontWeight:900,fontFamily:"'DM Mono',monospace",letterSpacing:0.5}}>
                      📸 CAPTURE
                    </button>
                    <button onClick={stopCam}
                      style={{background:T.dangerBg,border:`1px solid ${T.danger}`,color:T.danger,padding:"14px 18px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>
                      ⏹ Stop
                    </button>
                  </div>
                )}

                {/* ── Photo Gallery ── */}
                {photos.length > 0 && (
                  <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:13}}>
                    <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:10,paddingBottom:5,borderBottom:`1px solid ${T.border}`,letterSpacing:0.8,textTransform:"uppercase"}}>
                      📷 Captured Photos ({photos.length})
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      {photos.map((p,i)=>(
                        <div key={p.id} style={{position:"relative",borderRadius:6,overflow:"hidden",border:`1px solid ${T.border}`}}>
                          <img src={p.dataUrl} style={{width:"100%",display:"block",objectFit:"cover",aspectRatio:"4/3"}}/>
                          <div style={{background:"rgba(0,0,0,0.72)",padding:"4px 6px",fontSize:9,color:"#7EC850",fontFamily:"monospace",lineHeight:1.5}}>
                            {p.timestamp}<br/>
                            <span style={{color:"#fff"}}>ID: {p.indexVal}</span>
                          </div>
                          <button onClick={()=>setTree(t=>({...t,photos:t.photos.filter((_,j)=>j!==i)}))}
                            style={{position:"absolute",top:4,right:4,background:"rgba(180,0,0,0.85)",border:"none",color:"#fff",width:22,height:22,borderRadius:"50%",cursor:"pointer",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>
                            ×
                          </button>
                          <a href={p.dataUrl} download={`${p.indexVal}_${i+1}.jpg`}
                            style={{position:"absolute",bottom:32,right:4,background:"rgba(0,0,0,0.7)",borderRadius:4,padding:"2px 6px",fontSize:9,color:"#7EC850",textDecoration:"none"}}>
                            ↓ Save
                          </a>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {photos.length===0 && camActive && (
                  <div style={{textAlign:"center",color:T.textDim,fontSize:11,padding:12}}>
                    No photos captured yet for this record
                  </div>
                )}
              </div>
            );
          })()}


        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MonarchFieldApp/>);
</script>
</body>
</html>
